<!DOCTYPE html>
<html>
<head>
    <title>Rowspan Example</title>
</head>
<body>

    <h2>Student Marks</h2>

    <table border="1" cellpadding="10">
        <tr>
            <th>Student</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>

        <tr>
            <td rowspan="3">Aditi</td>
            <td>Math</td>
            <td>95</td>
        </tr>

        <tr>
            <td>English</td>
            <td>88</td>
        </tr>

        <tr>
            <td>Science</td>
            <td>92</td>
        </tr>

    </table>

</body>
</html>
