<!DOCTYPE html>
<html>
<head>
    <title>Application Form</title>
</head>
<body>

    <h2 align="center">Application Form</h2>

    <form>
        <table border="1" cellpadding="10" cellspacing="0" align="center">

            <tr>
                <td><label for="name">Name</label></td>
                <td><input type="text" id="name" required></td>
            </tr>

            <tr>
                <td><label for="email">Email</label></td>
                <td><input type="email" id="email" required></td>
            </tr>

            <tr>
                <td><label for="phone">Phone</label></td>
                <td><input type="tel" id="phone" required></td>
            </tr>

            <tr>
                <td><label for="dob">Date of Birth</label></td>
                <td><input type="date" id="dob" required></td>
            </tr>

            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>

                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>

                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other">Other</label>
                </td>
            </tr>

            <tr>
                <td>Skills</td>
                <td>
                    <input type="checkbox" id="html" name="skill" value="html">
                    <label for="html">HTML</label>

                    <input type="checkbox" id="css" name="skill" value="css">
                    <label for="css">CSS</label>

                    <input type="checkbox" id="javascript" name="skill" value="javascript">
                    <label for="javascript">JavaScript</label>
                </td>
            </tr>

            <tr>
                <td><label for="resume">Upload Resume</label></td>
                <td><input type="file" id="resume" required></td>
            </tr>

            <tr>
                <td><label for="photo">Upload Photo</label></td>
                <td><input type="file" id="photo" required></td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit">
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
