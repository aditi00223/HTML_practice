<!DOCTYPE html>
<html>
<head>
    <title>Forms Practice</title>
</head>

<body>

<form>

    <label for="name">Name:</label>
    <input type="text" id="name" name="name" placeholder="Enter your name" required>
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>
    <br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="Enter password" required>
    <br><br>

    <p>Gender:</p>

    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>

    <br><br>

    <p>Hobbies:</p>

    <input type="checkbox" id="cricket" name="hobby" value="cricket">
    <label for="cricket">Cricket</label>

    <input type="checkbox" id="music" name="hobby" value="music">
    <label for="music">Music</label>

    <input type="checkbox" id="coding" name="hobby" value="coding">
    <label for="coding">Coding</label>

    <br><br>

    <p>City:</p>

    <select id="city" name="city">
        <option value="delhi">Delhi</option>
        <option value="mumbai">Mumbai</option>
        <option value="chandigarh">Chandigarh</option>
        <option value="kolkata">Kolkata</option>
    </select>

    <br><br>

    <p>Message:</p>

    <textarea id="message" name="message" rows="4" cols="30" placeholder="Write your message here"></textarea>

    <br><br>

    <button type="submit">Submit</button>

</form>

</body>
</html>
